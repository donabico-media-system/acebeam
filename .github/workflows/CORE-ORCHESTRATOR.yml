name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  workflows: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: false # Không hủy luồng để xếp hàng xử lý dữ liệu chuẩn

jobs:
  execute_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: '1. Tải toàn bộ lịch sử mã nguồn (Chống lệch pha)'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: '2. Khởi tạo môi trường Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Thiết lập biến môi trường tự động'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Thực thi tập lệnh Core Engine'
        run: |
          if [ -f "./Super Core Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Core Affiliate/Super-Core-Affiliate.py"
          elif [ -f "./Super Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Affiliate/Super-Core-Affiliate.py"
          else
            python "./Super-Core-Affiliate.py"
          fi

      - name: '5. Cơ chế Đẩy Dữ Liệu Miễn Nhiễm Lỗi Xung Đột'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          CURRENT_BRANCH=${{ github.ref_name }}
          git checkout $CURRENT_BRANCH
          
          # Gom tất cả tài nguyên vừa sinh (Sitemap, RSS Feed, Bridges)
          git add -A
          
          # Chỉ xử lý nếu có biến động dữ liệu thực tế
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync dynamic SOTA bridge telemetry state [skip ci]"
            
            # GIẢI PHÁP LÕI: Lấy dữ liệu mới nhất vừa phát sinh từ các Workflow khác về để gộp
            git fetch origin $CURRENT_BRANCH
            
            # Ép gộp ưu tiên giữ nguyên file vừa sinh mà không xung đột lịch sử commit
            git merge origin/$CURRENT_BRANCH --strategy-option=ours --allow-unrelated-histories -m "chore: merge remote state changes"
            
            # Đẩy dữ liệu lên an toàn
            git push origin HEAD:$CURRENT_BRANCH
            echo "Đẩy dữ liệu lên GitHub Pages CDN hoàn tất với dung sai 0."
          else
            echo "Không phát hiện thay đổi cấu trúc dữ liệu biên. Bỏ qua push."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
