name: CORE-ORCHESTRATOR

on:
  schedule:
    # Hệ thống chạy tự động lệch pha (Mỗi 4 tiếng vào phút thứ 12)
    - cron: '12 */4 * * *'
  workflow_dispatch: # Cho phép nhấn nút chạy ngay lập tức trên giao diện GitHub

# QUAN TRỌNG: Cấp quyền tối cao để workflow có thể tự sửa lỗi, tự commit code và deploy Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compile Edge Routing Bridge (Fully Autonomous)
        run: |
          # 1. Tự tạo thư mục "Super Core Affiliate" nếu chưa tồn tại
          mkdir -p "Super Core Affiliate"
          
          # 2. Tự phục hồi mã nguồn Python sạch nếu file bị thiếu
          if [ ! -f "Super Core Affiliate/Super-Core-Affiliate.py" ]; then
            echo "Self-healing: Recreating Super-Core-Affiliate.py..."
            cat << 'EOF' > "Super Core Affiliate/Super-Core-Affiliate.py"
# -*- coding: utf-8 -*-
import os, json, time

def get_brand_context():
    repo_name = os.getenv('GITHUB_REPOSITORY', 'default/unknown-brand')
    parts = repo_name.split('/')[-1].split('-')
    return (parts[-1] if len(parts) > 1 else parts[0]).lower()

def load_global_config(brand_id):
    config_path = "Protocols/eseb_global_config.json"
    dynamic_template = { "affiliate_link": f"https://donabicomedia.net/{brand_id}", "active": True }
    configs = {}
    os.makedirs(os.path.dirname(config_path) or '.', exist_ok=True)
    if os.path.exists(config_path):
        try:
            with open(config_path, 'r', encoding='utf-8') as f: configs = json.load(f)
        except: configs = {}

    if "default" not in configs:
        configs["default"] = { "affiliate_link": "https://donabicomedia.net/fallback", "active": True }

    if brand_id not in configs:
        configs[brand_id] = dynamic_template
        try:
            with open(config_path, 'w', encoding='utf-8') as f: json.dump(configs, f, indent=4)
        except: pass
    return configs.get(brand_id, configs.get("default"))

def generate_edge_bridge():
    brand_id = get_brand_context()
    brand_config = load_global_config(brand_id)
    target_link = brand_config.get("affiliate_link")
    is_active = brand_config.get("active", True)
    current_timestamp = int(time.time())
    
    js_payload = f"""/**
 * EATHESEN MATRIX - SUPER CORE AFFILIATE BRIDGE (V5.0)
 * [V-STAMP 24 AUTHENTICATED]
 */
(function() {{
    const ESEB_TIMESTAMP = {current_timestamp};
    const CONFIG = {{ brandId: "{brand_id}", targetLink: "{target_link}", isActive: {str(is_active).lower()} }};
    document.addEventListener("DOMContentLoaded", function() {{
        console.log("[EHC] System Matrix Synced. Brand: " + CONFIG.brandId);
        const systemTimeSec = Math.floor(Date.now() / 1000);
        if (systemTimeSec - ESEB_TIMESTAMP > 14400) return;
        if (!CONFIG.isActive) return;
        const actionButtons = document.querySelectorAll('a[href="#affiliate-action"]');
        actionButtons.forEach(btn => {{
            btn.setAttribute("href", CONFIG.targetLink);
            btn.setAttribute("target", "_blank");
            btn.setAttribute("rel", "noopener noreferrer sponsored");
        }});
    }});
}})();"""
    os.makedirs("Bridges", exist_ok=True)
    with open("Bridges/Super-Core-Affiliate.js", "w", encoding="utf-8") as f:
        f.write(js_payload)
    print(f"[SUCCESS] Compile completed for Brand: {brand_id}")

if __name__ == "__main__":
    generate_edge_bridge()
EOF
          fi
          
          # 3. Thực thi file Python
          python "Super Core Affiliate/Super-Core-Affiliate.py"

      - name: Commit and Push Compiled Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Thêm các tệp tự sinh vào Git tracking
          git add "Super Core Affiliate/" Bridges/ Protocols/
          
          # Chỉ commit nếu có thay đổi thực sự để tránh spam lịch sử Git
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
          else
            git commit -m "chore: [system-orchestrator] auto-align brand assets [skip ci]"
            git push origin main
          fi

      - name: Deploy static site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
