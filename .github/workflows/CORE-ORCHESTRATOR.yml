name: CORE-ORCHESTRATOR

on:
  schedule:
    - cron: '30 * * * *' # Chạy mỗi giờ (lệch 30 phút so với các Workflow con)
  workflow_dispatch:

permissions:
  contents: read
  actions: write # Quyền tối cao kích hoạt và giám sát các hạ tầng Workflow khác

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ CHECKOUT REPOSITORY SUBSTRATE
        uses: actions/checkout@v4 # Nâng cấp lên v4 tối ưu hóa bộ nhớ đệm và tốc độ mạng

      - name: ⚡ SETUP PYTHON RUNTIME ENVIRONMENT
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: ⚙️ INSTALL SOTA VALIDATION DEPENDENCIES
        run: |
          python -m pip install --upgrade pip
          pip install pydantic lxml

      - name: 🚀 TRIGGER ACTIVE-MODULES-SOTA
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log("[ORCHESTRATOR] Đang phát xung kích hoạt ACTIVE-MODULES-SOTA...");
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ACTIVE-MODULES-SOTA.yml',
              ref: 'main'
            });

      - name: 🚀 TRIGGER ACTIVE-PROTOCOLS-SOTA
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log("[ORCHESTRATOR] Đang phát xung kích hoạt ACTIVE-PROTOCOLS-SOTA...");
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ACTIVE-PROTOCOLS-SOTA.yml',
              ref: 'main'
            });

      - name: 🧠 EXECUTE SUPER CORE AFFILIATE LOGIC (RECURSION ENGINE)
        run: |
          if [ -d "Super Core Affiliate" ]; then
            echo "[SUCCESS] Tìm thấy phân vùng lõi 'Super Core Affiliate'. Khởi chạy bộ xử lý nhận thức..."
            python "Super Core Affiliate/Super-Core-Affiliate.py"
          else
            echo "[CRITICAL ERROR] Không tìm thấy thư mục 'Super Core Affiliate'. Kích hoạt cơ chế cô lập."
            ls -laF
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_MODE: "SUPER_SMART_INTELLIGENT"
          DUNG_SAI_CHOT_CHAN: "Super-Omega-Planck-128"
