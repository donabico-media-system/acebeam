name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *' # Thực thi liên tục chu kỳ 2 tiếng một lần để hoán đổi token dấu thời gian
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  workflows: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  execute_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: '1. Tải cấu trúc mã nguồn Shallow (Tốc độ tối đa)'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: '2. Khởi tạo môi trường Python SOTA'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Tiêm biến môi trường MCP tự động phát hiện tên Repo'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Kích hoạt Động cơ phân tán dữ liệu liên kết'
        run: |
          if [ -f "./Super Core Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Core Affiliate/Super-Core-Affiliate.py"
          elif [ -f "./Super Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Affiliate/Super-Core-Affiliate.py"
          else
            python "./Super-Core-Affiliate.py"
          fi

      - name: '5. Đẩy dữ liệu bằng cơ chế Direct Refspec Force Matrix'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          CURRENT_BRANCH=${{ github.ref_name }}
          
          # Đóng gói toàn bộ tài nguyên (landing_pages.html, sitemap, feed) vào staging
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: dynamic global sync infrastructure state [skip ci]"
            
            # Đẩy trực tiếp mã băm cục bộ đè lên Server, bỏ qua mọi xung đột của các Bot khác
            git push origin HEAD:$CURRENT_BRANCH --force
            echo "[SUCCESS] GitHub Pages CDN Edge synchronized immutably."
          else
            echo "No structural changes detected. Moving forward."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
