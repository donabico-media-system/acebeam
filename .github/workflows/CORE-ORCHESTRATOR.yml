name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *' # Tự động chạy định kỳ mỗi 2 tiếng
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Cấp đặc quyền ghi trực tiếp vào nội dung kho lưu trữ
permissions:
  contents: write
  workflows: write

jobs:
  execute_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: '1. Tải mã nguồn từ Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: '2. Khởi tạo môi trường Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Thiết lập biến môi trường tự động'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Thực thi tập lệnh Core Engine'
        run: |
          if [ -f "./Super Core Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Core Affiliate/Super-Core-Affiliate.py"
          elif [ -f "./Super Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Affiliate/Super-Core-Affiliate.py"
          else
            python "./Super-Core-Affiliate.py"
          fi

      - name: '5. Tự động Commit và Push mọi thay đổi'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-sync dynamic SOTA bridge telemetry state [skip ci]"
          skip_dirty_check: false
          skip_fetch: false
