name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    # Kích hoạt tự động chu kỳ 120 phút/lần (2 tiếng một lần) liên tục 24/7
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  hybrid_mcp_swarm_execution:
    name: 'Execute MCP Hybrid Parallel Engine'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: '1. Checkout Master Repository Ecosystem'
        uses: actions/checkout@v4

      - name: '2. Deploy Advanced Python Environment'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Inject Hybrid MCP Environment Variables'
        run: |
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://donabico-global-media.github.io/acebeam/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-2026" >> $GITHUB_ENV
        # Mọi cấu hình đồng bộ trực tiếp tới tọa độ CDN tĩnh của hệ thống

      - name: '4. Boot Super Core Affiliate Parallel Swarm'
        run: |
          chmod +x "./Super Core Affiliate/Super-Core-Affiliate.py"
          python "./Super Core Affiliate/Super-Core-Affiliate.py"
        env:
          PYTHONUNBUFFERED: "1"

      - name: '5. Pipeline Execution Verification'
        if: success()
        run: |
          echo "=========================================================================="
          echo "[ SOTA MCP SWARM SUCCESS ] 24 Parallel Threads Execution Terminated Cleanly."
          echo "=========================================================================="

      - name: '6. Handle Ingestion Network Faults'
        if: failure()
        run: |
          echo "=========================================================================="
          echo "[ CRITICAL ERROR ] MCP Hybrid Swarm connection failure detected!"
          echo "=========================================================================="

