name: CORE-ORCHESTRATOR

on:
  schedule:
    - cron: '30 * * * *' # Chạy mỗi giờ (lệch 30 phút so với các Workflow con)
  workflow_dispatch:

permissions:
  contents: read
  actions: write # Quyền hạn tối cao bắt buộc để điều phối tiến trình chạy

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ CHECKOUT REPOSITORY SUBSTRATE
        uses: actions/checkout@v4

      - name: ⚡ SETUP PYTHON RUNTIME ENVIRONMENT
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ INSTALL SOTA VALIDATION DEPENDENCIES
        run: |
          python -m pip install --upgrade pip
          pip install pydantic lxml

      - name: 🚀 TRIGGER SUB-WORKFLOWS VIA NATIVE GH CLI
        run: |
          echo "[ORCHESTRATOR] Khởi chạy vòng lặp kích hoạt bằng GitHub CLI..."
          
          # Kích hoạt ACTIVE-MODULES-SOTA bằng file name chính xác
          gh workflow run ACTIVE-MODULES-SOTA.yml --ref main
          echo "[SUCCESS] Đã phát xung kích hoạt thành công ACTIVE-MODULES-SOTA."
          
          # Kích hoạt ACTIVE-PROTOCOLS-SOTA bằng file name chính xác
          gh workflow run ACTIVE-PROTOCOLS-SOTA.yml --ref main
          echo "[SUCCESS] Đã phát xung kích hoạt thành công ACTIVE-PROTOCOLS-SOTA."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Sử dụng Token bảo mật nguyên bản

      - name: 🧠 EXECUTE SUPER CORE AFFILIATE LOGIC (RECURSION ENGINE)
        run: |
          if [ -d "Super Core Affiliate" ]; then
            echo "[SUCCESS] Phân vùng lõi 'Super Core Affiliate' hợp lệ."
            python "Super Core Affiliate/Super-Core-Affiliate.py"
          else
            echo "[CRITICAL ERROR] Thiếu dữ liệu phân vùng vật lý."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_MODE: "SUPER_SMART_INTELLIGENT"
