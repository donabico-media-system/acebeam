name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Cấp quyền cho máy ảo đóng gói và xuất bản thẳng lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  execute_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: '1. Tải cấu trúc mã nguồn'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: '2. Khởi tạo môi trường Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Thiết lập thông số nút mạng tự động'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Tự động tìm kiếm và Kích hoạt Động cơ Python'
        run: |
          PY_PATH=$(find . -name "Super-Core-Affiliate.py" -print -quit)
          if [ -z "$PY_PATH" ]; then
            echo "[CRITICAL ERROR] Không tìm thấy tệp Super-Core-Affiliate.py!"
            exit 1
          else
            python3 "$PY_PATH"
          fi

      - name: '5. Chuẩn bị thư mục xuất bản độc lập'
        run: |
          # Gom toàn bộ file vừa sinh vào một thư mục tạm để đẩy lên Pages
          mkdir -p _site
          cp landing_pages.html _site/
          cp sitemap.xml _site/
          cp feed.xml _site/
          # Copy thêm file index.html trỏ về landing_pages.html để đảm bảo không bị lỗi 404 trang chủ
          cp landing_pages.html _site/index.html

      - name: '6. Đóng gói tài nguyên tĩnh (Bypass Git)'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: '7. Xuất bản trực tiếp lên GitHub Pages CDN'
        id: deployment
        uses: actions/deploy-pages@v4
