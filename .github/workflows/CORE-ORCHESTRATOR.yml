name: CORE-ORCHESTRATOR

on:
  schedule:
    - cron: '30 * * * *' # Chạy tự động đều đặn mỗi giờ ra Internet
  workflow_dispatch:

# NÂNG CẤP QUYỀN HẠN TỐI CAO: Cho phép ghi trực tiếp vào repo mà không cần cầu nối
permissions:
  contents: write
  actions: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ CHECKOUT REPOSITORY SUBSTRATE
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Đọc toàn bộ lịch sử Git để chuẩn bị ghi đè dữ liệu phẳng

      - name: ⚡ SETUP PYTHON RUNTIME ENVIRONMENT
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ INSTALL SOTA VALIDATION DEPENDENCIES
        run: |
          python -m pip install --upgrade pip
          pip install pydantic lxml

      - name: 🧠 EXECUTE SUPER CORE MONOLITHIC LOGIC
        run: |
          if [ -d "Super Core Affiliate" ]; then
            echo "[SUCCESS] Tìm thấy phân vùng lõi 'Super Core Affiliate'. Kích hoạt động cơ phản lực..."
            python "Super Core Affiliate/Super-Core-Affiliate.py"
          else
            echo "[CRITICAL ERROR] Không tìm thấy thư mục vật lý 'Super Core Affiliate'."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_MODE: "MONOLITHIC_DIRECT_INJECTION"

      - name: 💾 COMMIT & PUSH DIRECT MATRIX CHANGES
        run: |
          git config --local user.email "donabico.media.system@gmail.com"
          git config --local user.name "DONABICO GLOBAL MEDIA SYSTEM Admin"
          
          # Đánh chặn thay đổi: Chỉ commit nếu index.html thực sự bị biến đổi bởi Modules/Protocols
          if [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            git commit -m "⚡ [EATHESEN-MONOLITH] Auto-Injected Matrix Modules directly to index.html"
            git push origin main
            echo "[SUCCESS] Đã đồng bộ hóa biến đổi giao diện thực chiến lên Internet vĩnh cửu!"
          else
            echo "[INFO] Không có sự thay đổi cấu trúc nào được phát hiện trong chu kỳ này."
          fi
