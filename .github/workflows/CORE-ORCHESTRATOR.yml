name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *' # Kích hoạt lệch pha 2 tiếng/lần chống bộ lọc mẫu của BigTech
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  hybrid_mcp_swarm_execution:
    name: 'Execute MCP Hybrid Parallel Engine'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: '1. Checkout Master Repository Ecosystem'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: '2. Deploy Advanced Python Environment'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Inject Hybrid MCP Environment Variables (Dynamic Multi-Repo Detection)'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          TARGET_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"
          NODE_IDENTIFIER="DONABICO-CORE-SOTA-${REPO_NAME^^}-2026"
          
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=${TARGET_URL}" >> $GITHUB_ENV
          echo "NODE_ID=${NODE_IDENTIFIER}" >> $GITHUB_ENV

      - name: '4. Boot Super Core Affiliate Parallel Swarm & BigTech Broadcaster'
        run: |
          # Dùng thuật toán Bash Shell Test để định vị duy nhất tệp tin, triệt tiêu lỗi log trùng lặp
          if [ -f "./Super Core Affiliate/Super-Core-Affiliate.py" ]; then
            chmod +x "./Super Core Affiliate/Super-Core-Affiliate.py"
            python "./Super Core Affiliate/Super-Core-Affiliate.py"
          elif [ -f "./Super Affiliate/Super-Core-Affiliate.py" ]; then
            chmod +x "./Super Affiliate/Super-Core-Affiliate.py"
            python "./Super Affiliate/Super-Core-Affiliate.py"
          else
            chmod +x "./Super-Core-Affiliate.py"
            python "./Super-Core-Affiliate.py"
          fi
        env:
          PYTHONUNBUFFERED: "1"

      - name: '5. Commit & Sync Dynamic Bridge & Core Infrastructure (Conflict-Free Force Sync)'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          
          # Hút toàn bộ thay đổi tại thư mục Bridges và các tệp mã nguồn vào hàng đợi
          git add Bridges/Super-Core-Affiliate.js
          git add "Super Core Affiliate/Super-Core-Affiliate.py" || true
          git add "Super Affiliate/Super-Core-Affiliate.py" || true
          git add "Super-Core-Affiliate.py" || true
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync dynamic SOTA bridge and core matrix state"
            git pull --strategy-option=theirs origin main --no-rebase || (git merge --abort && git reset --hard origin/main && git add -A && git commit -m "chore: force sync infrastructure")
            git push origin HEAD:main
          else
            echo "No infrastructure changes detected. Skipping repository push."
          fi
        continue-on-error: false

      - name: '6. Pipeline Execution Verification'
        if: success()
        run: |
          echo "=========================================================================="
          echo "[ SOTA BROADCAST SUCCESS ] Signal Dispatched via IndexNow Network."
          echo "Bridges/Super-Core-Affiliate.js Deployment Verified Clean."
          echo "=========================================================================="
