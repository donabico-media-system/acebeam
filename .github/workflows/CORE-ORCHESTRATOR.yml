name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  workflows: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  execute_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: '1. Tải cấu trúc mã nguồn Shallow'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: '2. Khởi tạo môi trường Python SOTA'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Thiết lập biến môi trường tự động phát hiện tên Repo'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Tự động tìm kiếm và Kích hoạt Động cơ Super-Core-Affiliate.py'
        run: |
          echo "[INFO] Đang quét toàn bộ hệ thống để tìm tệp thực thi..."
          # Sử dụng lệnh find để định vị chính xác vị trí tệp .py trong không gian làm việc
          PY_PATH=$(find . -name "Super-Core-Affiliate.py" -print -quit)
          
          if [ -z "$PY_PATH" ]; then
            echo "[CRITICAL ERROR] Không tìm thấy tệp Super-Core-Affiliate.py trên kho lưu trữ!"
            exit 1
          else
            echo "[SUCCESS] Đã tìm thấy động cơ tại vị trí: $PY_PATH"
            python3 "$PY_PATH"
          fi

      - name: '5. Cưỡng bức đẩy đè dữ liệu bằng Direct Refspec Matrix'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          CURRENT_BRANCH=${{ github.ref_name }}
          
          # Đóng gói 3 tài nguyên CDN biên chiến lược
          git add landing_pages.html sitemap.xml feed.xml || git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: dynamic global sync infrastructure state [skip ci]"
            # Lệnh tối thượng: Ép đè mã băm để giải quyết triệt để lỗi xung đột phân nhánh do các bot chạy song song
            git push origin HEAD:$CURRENT_BRANCH --force
            echo "[EATHESEN SUCCESS] Hệ thống CDN biên đã đồng bộ xanh mượt."
          else
            echo "Không phát hiện biến động cấu trúc dữ liệu. Bỏ qua commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
