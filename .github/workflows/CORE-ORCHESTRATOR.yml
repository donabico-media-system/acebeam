name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    # Kích hoạt tự động chu kỳ 120 phút/lần (2 tiếng/lần)
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  hybrid_mcp_swarm_execution:
    name: 'Execute MCP Hybrid Parallel Engine'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: '1. Checkout Master Repository Ecosystem'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử commit để tránh lỗi rebase ngầm

      - name: '2. Deploy Advanced Python Environment'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Inject Hybrid MCP Environment Variables'
        run: |
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://donabico-global-media.github.io/acebeam/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-2026" >> $GITHUB_ENV

      - name: '4. Boot Super Core Affiliate Parallel Swarm'
        run: |
          chmod +x "./Super Core Affiliate/Super-Core-Affiliate.py"
          python "./Super Core Affiliate/Super-Core-Affiliate.py"
        env:
          PYTHONUNBUFFERED: "1"

      - name: '5. Commit & Sync Dynamic Bridge Infrastructure (Zero-Trust Guard)'
        # Tích hợp cơ chế cất tệp rác (Stash) trước khi rebase để dọn sạch hoàn toàn lỗi exit code 128
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. Chỉ đưa đúng tệp cầu nối JS vào vùng chuẩn bị commit
          git add Bridges/Bridge-Super-Core-Affiliate.js
          
          # Kiểm tra xem tệp cầu nối thực sự có thay đổi nội dung hay không
          if ! git diff --quiet -- Bridges/Bridge-Super-Core-Affiliate.js || ! git diff --staged --quiet -- Bridges/Bridge-Super-Core-Affiliate.js; then
            
            # 2. Tạo commit cục bộ cho file JS trước
            git commit -m "chore: auto-sync dynamic SOTA bridge telemetry state"
            
            # 3. Tạm thời cất toàn bộ các thay đổi không liên quan hoặc file rác phát sinh
            git stash --include-untracked
            
            # 4. Kéo mã nguồn mới nhất từ remote và thiết lập rebase sạch
            git pull --rebase origin main || git pull --rebase origin master
            
            # 5. Đẩy dữ liệu cầu nối an toàn lên hệ thống đám mây
            git push origin HEAD
            
            # 6. Trả lại trạng thái các file tạm (nếu cần)
            git stash pop || echo "No stashed files to restore."
          else
            echo "No telemetry changes detected in Bridge-Super-Core-Affiliate.js. Skipping sync."
          fi
        continue-on-error: false

      - name: '6. Pipeline Execution Verification'
        if: success()
        run: |
          echo "=========================================================================="
          echo "[ SOTA MCP SWARM SUCCESS ] Zero-Trust Buffer Optimization Completed!"
          echo "Bridge Telemetry Synced and Pushed with Absolute Operational Security."
          echo "index.html Integrity: 100% Locked & Untouched."
          echo "=========================================================================="
