name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  workflows: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  execute_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: '1. Tải mã nguồn shallow (Tối ưu tốc độ luồng)'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: '2. Khởi tạo môi trường Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Thiết lập biến môi trường tự động'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Thực thi tập lệnh Core Engine'
        run: |
          if [ -f "./Super Core Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Core Affiliate/Super-Core-Affiliate.py"
          elif [ -f "./Super Affiliate/Super-Core-Affiliate.py" ]; then
            python "./Super Affiliate/Super-Core-Affiliate.py"
          else
            python "./Super-Core-Affiliate.py"
          fi

      - name: '5. Đẩy dữ liệu bằng cơ chế Direct Refspec (Bypass Mọi Xung Đột Bot)'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          CURRENT_BRANCH=${{ github.ref_name }}
          
          # Gom toàn bộ file tĩnh mới sinh vào cây chỉ mục nội bộ
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync dynamic SOTA bridge telemetry state [skip ci]"
            
            # GIẢI PHÁP LÕI TRỰC TIẾP: Đẩy thẳng gói tin từ HEAD local đè lên nhánh của Server
            # Không pull, không merge, không cần khớp lịch sử với Bot khác
            git push origin HEAD:$CURRENT_BRANCH --force
            echo "Đã cưỡng bức cập nhật CDN biên thành công."
          else
            echo "Không có biến động dữ liệu. Bỏ qua push."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
