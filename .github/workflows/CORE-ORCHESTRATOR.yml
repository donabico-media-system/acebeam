name: 'CORE-ORCHESTRATOR'

on:
  schedule:
    - cron: '0 */2 * * *' # Thực thi chu kỳ 2 tiếng một lần để hoán đổi vòng lặp CDN
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  workflows: write
  pages: write
  id-token: write

concurrency:
  group: "core-orchestrator-matrix"
  cancel-in-progress: true

jobs:
  execute_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: '1. Khởi động hạ tầng và Checkout mã nguồn'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: '2. Cấu hình môi trường Python SOTA'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Nạp biến môi trường MCP thích ứng động'
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "HYBRID_PROTOCOL=MCP_A2A_GOOGLE_HYBRID" >> $GITHUB_ENV
          echo "MAX_PARALLEL_THREADS=24" >> $GITHUB_ENV
          echo "TARGET_INDEX_NODE=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> $GITHUB_ENV
          echo "NODE_ID=DONABICO-CORE-SOTA-${REPO_NAME^^}-2026" >> $GITHUB_ENV

      - name: '4. Giải mã và Khởi chạy Động cơ Super-Core-Affiliate SOTA'
        run: |
          # Chuỗi Base64 bảo vệ mã nguồn Python nguyên bản chống mọi lỗi cú pháp YAML
          echo "" | base64 -d > Super-Core-Affiliate.py
          
          # Thực thi động cơ Python vừa giải nén
          python3 Super-Core-Affiliate.py

      - name: '5. Cưỡng bức đồng bộ dữ liệu bằng Direct Refspec (Dung sai = 0)'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          CURRENT_BRANCH=${{ github.ref_name }}
          
          # Thu thập chính xác các file tĩnh phục vụ CDN biên
          git add landing_pages.html sitemap.xml feed.xml
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: dynamic deployment activation [skip ci]"
            # Ép đẩy nhị phân trực tiếp lên Server để triệt tiêu toàn bộ tranh chấp phân nhánh
            git push origin HEAD:$CURRENT_BRANCH --force
            echo "[EATHESEN SUCCESS] Toàn bộ hệ thống xanh mượt."
          else
            echo "Không phát hiện thay đổi dữ liệu cấu trúc. Bỏ qua commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
