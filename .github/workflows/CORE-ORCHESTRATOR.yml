name: "CORE-ORCHESTRATOR"

on:
  push:
    branches:
      - main
      - master
    # BỘ LỌC TỐI ƯU: Chỉ chạy khi có biến động ở các file logic/giao diện này
    paths:
      - "index.html"
      - "landing_pages.html"
      - "Super Core Affiliate/**"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "core-orchestrator-lock"
  cancel-in-progress: true

jobs:
  execute-ehc-hydration:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Đóng Gói Phân Vùng Mã Nguồn (Checkout Entire History)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để thực hiện rebase mượt mà

      - name: "2. Khởi Tạo Môi Trường Python Core SOTA"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "3. Cài Đặt Thư Viện Kiểm Duyệt Dung Sai Hệ Thống"
        run: |
          python -m pip install --upgrade pip
          pip install pydantic lxml torch --no-cache-dir

      - name: "4. Thực Thi Kích Hoạt Chế Độ Super Smart Intelligent Mode"
        env:
          MCP_A2A_SECRET: ${{ secrets.MCP_A2A_TOKEN }}
        run: |
          python "Super Core Affiliate/Super-Core-Affiliate.py"

      - name: "5. Kiểm Tra Tổng Thể An Toàn Bản Nguyên (Compliance Audit)"
        run: |
          if grep -q 'href="#"' index.html; then
            echo "[CRITICAL-ERROR] Phát hiện ký tự nhảy trang '#' chưa được xử lý!"
            exit 1
          else
            echo "[SUCCESS] Chuẩn cấu trúc HTML đạt mức dung sai an toàn tuyệt đối."
          fi

      - name: "6. Đồng Bộ Đóng Băng Dữ Liệu Nội Bộ (Git Rebase & Push)"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add index.html
          
          if git diff-index --quiet HEAD --; then
            echo "Hệ thống tĩnh đã ở trạng thái tối ưu nhất. Không cần cập nhật."
          else
            git commit -m "chore(ehc): [V-STAMP 24] Đột phá cấu trúc đệ quy MCP A2A Hybrid"
            git pull origin ${{ github.ref_name }} --rebase
            git push origin HEAD
          fi
