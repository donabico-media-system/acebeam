name: DEPLOY-CLOUDFLARE-INTERNET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      
  id-token: write   

concurrency:
  group: "cloudflare-internet-symbiosis"
  cancel-in-progress: true

jobs:
  # LUỒNG 1: ĐẨY LÊN GITHUB PAGES TĨNH & XUẤT FILE TRẠNG THÁI
  deploy-github-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code Matrix
        uses: actions/checkout@v4

      - name: 2. Tự động sinh Log Internet-Bridge.json
        run: |
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat <<EOF > Internet-Bridge.json
          {
            "status": "Online",
            "protocol": "INTERNET-EDGE-BRIDGE",
            "system_activity_indicator": "green",
            "last_deploy_utc": "$CURRENT_TIME",
            "repository": "${{ github.repository }}"
          }
          EOF

      - name: 3. Kích hoạt cấu hình Pages bản địa
        uses: actions/configure-pages@v5

      - name: 4. Đóng gói và phát tán ra Internet-Vệ tinh
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: 5. Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # LUỒNG 2: TỰ ĐỘNG KHỞI TẠO VÀ ĐẨY LÊN EDGE CLOUDFLARE QUY MÔ LỚN
  deploy-cloudflare-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code Matrix
        uses: actions/checkout@v4

      - name: 2. Cài đặt môi trường Node.js bản mới nhất
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Ép Cloudflare tự tạo Project và Deploy tự động
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "Hệ thống bắt đầu quét hạ tầng cho kho thương hiệu: $REPO_NAME"
          
          # [BƯỚC CHÌA KHÓA]: Thử tạo dự án mới trên Cloudflare. 
          # Nếu dự án đã tồn tại, lệnh sẽ báo lỗi nhưng "|| true" sẽ bỏ qua để chạy tiếp luồng.
          npx wrangler pages project create "$REPO_NAME" --production-branch="main" || true
          
          echo "Khởi tạo hạ tầng hoàn tất! Tiến hành bắn dữ liệu lên Edge CDN..."
          
          # Thực hiện Deploy dữ liệu lên phân vùng vừa tạo
          npx wrangler pages deploy . --project-name="$REPO_NAME" --branch="main"
