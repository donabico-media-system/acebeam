name: GOOGLE DISPLAY PROTOCOL

on:
  push:
    branches: [ "gh-pages" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Gravity Compiler
        run: |
          # Kiểm tra sự tồn tại của file Python trước khi chạy để tránh lỗi im lặng
          if [ -f "Modules/Google-Display.py" ]; then
            python Modules/Google-Display.py
          else
            echo "::error::Khong tim thay Modules/Google-Display.py tren nhanh gh-pages! Hãy dam bao file py da duoc push."
            exit 1
          fi

      - name: Deploy and Commit directly to gh-pages Root
        run: |
          git config --global user.name "donabico-global-media"
          git config --global user.email "donabico.media.system@gmail.com"
          
          # Cơ chế kiểm tra an toàn tầng Yocto: Chỉ add nếu tệp thực sự được tạo ra
          if [ -f "Bridges/Google-Display.js" ]; then
            git add Bridges/Google-Display.js
            git diff-index --quiet HEAD || git commit -m "build(yocto): clean gh-pages core deploy [skip ci]"
            git push origin gh-pages
          else
            echo "::error::Tep cau noi Bridges/Google-Display.js khong duoc tao ra tu file Python!"
            exit 1
          fi
