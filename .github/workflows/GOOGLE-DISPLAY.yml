name: GOOGLE DISPLAY PROTOCOL

on:
  schedule:
    - cron: '0 */4 * * *'  # CHU KỲ MỚI: Tự động chạy ngầm chính xác 4 tiếng một lần cho toàn bộ hệ thống
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Gravity Compiler
        run: |
          if [ -f "Modules/Google-Display.py" ]; then
            python Modules/Google-Display.py
          else
            echo "::error::Khong tim thay Modules/Google-Display.py!"
            exit 1
          fi

      - name: Deploy and Commit Dynamically to Root
        run: |
          # Nhận diện tự động Actor của kho chứa để tránh lỗi chặn quyền ghi (Permission Denied)
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          
          if [ -f "Bridges/Google-Display.js" ]; then
            git add Bridges/Google-Display.js
            git diff-index --quiet HEAD || git commit -m "build(eseb): dynamic handshake bridge deploy [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "::error::Tep cau noi Bridges/Google-Display.js khong duoc tao ra!"
            exit 1
          fi
