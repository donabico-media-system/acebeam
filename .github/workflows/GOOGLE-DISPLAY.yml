name: GOOGLE DISPLAY PROTOCOL

on:
  push:
    branches: [ "main" ]  # <--- Khóa theo dõi chính xác trên nhánh main của kho acebeam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main  # <--- Tải code từ nhánh main về máy chủ ảo

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Gravity Compiler
        run: |
          if [ -f "Modules/Google-Display.py" ]; then
            python Modules/Google-Display.py
          else
            echo "::error::Khong tim thay Modules/Google-Display.py tren nhanh main! Hãy dam bao file py da duoc push."
            exit 1
          fi

      - name: Deploy and Commit directly to main Root
        run: |
          git config --global user.name "donabico-global-media"
          git config --global user.email "donabico.media.system@gmail.com"
          
          if [ -f "Bridges/Google-Display.js" ]; then
            git add Bridges/Google-Display.js
            git diff-index --quiet HEAD || git commit -m "build(yocto): clean main core deploy [skip ci]"
            git push origin main  # <--- Đẩy thẳng về nhánh main
          else
            echo "::error::Tep cau noi Bridges/Google-Display.js khong duoc tao ra tu file Python!"
            exit 1
          fi
