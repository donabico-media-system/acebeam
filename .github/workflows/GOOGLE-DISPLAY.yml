name: GOOGLE DISPLAY PROTOCOL

on:
  push:
    branches: [ "gh-pages" ]
    paths:
      - 'Modules/Google-Display.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Gravity Compiler
        run: |
          python Modules/Google-Display.py

      - name: Deploy and Commit directly to gh-pages Root
        run: |
          git config --global user.name "donabico-global-media"
          git config --global user.email "donabico.media.system@gmail.com"
          
          # Chỉ thêm duy nhất file cầu nối JS vào luồng kiểm soát
          git add Bridges/Google-Display.js
          git diff-index --quiet HEAD || git commit -m "build(yocto): clean gh-pages core deploy [skip ci]"
          git push origin gh-pages
