name: DEPLOY-TO-CLOUDFLARE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-edge:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Đẩy thẳng code lên Edge Cloudflare (Tự động tạo Project)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Ép hệ thống lấy luôn tên kho GitHub hiện tại (acebeam) để tự động tạo dự án
          projectName: "${{ github.event.repository.name }}" 
          directory: "."
          # ĐÂY LÀ CHÌA KHÓA: Cấp token GitHub nội bộ để kích hoạt quyền tự động tạo dự án của Cloudflare App
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
