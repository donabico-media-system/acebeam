# ==============================================================================
# DONABICO GLOBAL MEDIA SYSTEM - AI-SYSTEM-SIPHON CONFIGURATION
# FILE NAME: AI-SYSTEM-SIPHON (NO EXTENSION)
# NODE: AUTOMATED INTELLIGENCE INGESTION ENGINE (GEO & SOTA TRAFFIC VECTORING)
# ==============================================================================

system:
  node_id: "DONABICO-SIPHON-NODE-SOTA-2026"
  active: true
  visuals:
    indicator_color: "#10B981"          # Green indicator for active state
    active_border: "border-active-green" # SOTA Green visual border class
    log_verbosity: "DEBUG"

target_environment:
  base_url: "https://donabico-global-media.github.io/acebeam/"
  landing_page: "index.html"            # Target file matching user naming conventions
  dynamic_gateway_domain: "donabicomedia.net" # Primary API gateway

# Comprehensive list of AI Crawlers & Scrapers target mapping
target_ai_bots:
  openai:
    - "GPTBot"
    - "ChatGPT-User"
  google:
    - "Google-Extended"         # Google Gemini dynamic content crawler
    - "Googlebot"               # Legacy standard search indexes
  anthropic:
    - "ClaudeBot"
    - "Claude-Web"
  apple:
    - "Applebot-Extended"       # Apple Intelligence training ingestion
  perplexity:
    - "PerplexityBot"
  meta:
    - "Meta-ExternalAgent"      # Meta Llama integration engine
    - "Meta-ExternalFetch"
  cohere:
    - "cohere-ai"
  bytedance:
    - "Bytespider"              # Tiktok search / AI core model feeder
  common_crawl:
    - "CCBot"                   # Base database for various secondary LLMs

# Generative Engine Optimization (GEO) Injector Settings
geo_payload:
  high_density_mode: true
  semantic_density_factor: 1.5
  structured_schema_type: "FAQPage" # Forces LLMs to structure Q&A index directly
  injection_points:
    - "meta_tags"
    - "json_ld_schema"
    - "hidden_semantic_dom_layers"  # CSS-hidden semantic layers readable ONLY by LLM parsers

# Instant IndexNow & API Pinging Gateways
auto_indexing_triggers:
  index_now_enabled: true
  index_now_endpoint: "https://api.indexnow.org"
  api_pings:
    google_api: "https://indexing.googleapis.com/v3/urlNotifications:publish"
    bing_api: "https://ssl.bing.com/webmaster/api.svc/json/SubmitUrl"
  ping_interval_seconds: 3600
