# ==============================================================================
# DONABICO GLOBAL MEDIA SYSTEM - AI-SYSTEM-SIPHON CONFIGURATION
# FILE NAME: AI-SYSTEM-SIPHON (NO EXTENSION)
# STATUS: STANDALONE ENGINE (NO WORKFLOW DEPENDENCY)
# ==============================================================================

system:
  node_id: "DONABICO-SIPHON-NODE-SOTA-2026"
  active: true
  visuals:
    indicator_color: "#10B981"          # Emerald Green active state
    active_border: "border-active-green"
    log_verbosity: "DEBUG"

target_environment:
  base_url: "https://donabico-global-media.github.io/acebeam/"
  landing_page: "index.html"
  dynamic_gateway_domain: "donabicomedia.net"

# Danh sách định danh toàn bộ Bot AI Dân Sự & Thương Mại của các Bigtech để thu hút
target_ai_bots:
  openai:
    - "GPTBot"
    - "ChatGPT-User"
  google:
    - "Google-Extended"         # Bộ quét dữ liệu trí tuệ nhân tạo Gemini
    - "Googlebot"               # Bộ chỉ mục lõi của Google Search
  anthropic:
    - "ClaudeBot"
    - "Claude-Web"
  apple:
    - "Applebot-Extended"       # Apple Intelligence ingestion feeder
  perplexity:
    - "PerplexityBot"
  meta:
    - "Meta-ExternalAgent"      # Llama AI integration crawler
    - "Meta-ExternalFetch"
  bytedance:
    - "Bytespider"              # Tiktok AI data ingestion
  common_crawl:
    - "CCBot"                   # Cơ sở dữ liệu huấn luyện của hàng trăm LLM mã nguồn mở

# Cấu hình tối ưu hóa mô hình ngôn ngữ lớn sinh dữ liệu (GEO)
geo_payload:
  high_density_mode: true
  semantic_density_factor: 2.5
  structured_schema_type: "FAQPage" # Ép các mô hình AI bóc tách cấu trúc Q&A lập chỉ mục ngay
