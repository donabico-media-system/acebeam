name: SEP AUTOMATION PROTOCOL

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Giữ nút bấm kích hoạt thủ công cho Ngài trên Mobile/Web

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Automation Script
        run: |
          python Modules/SEP-Automation.py

      - name: Commit and Push Autogenerated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Chỉ theo dõi và tự push ngược lại sitemap.xml và file cầu nối JS
          git add sitemap.xml Bridges/SEP-Observer.js
          
          # Thực hiện commit nếu có thay đổi thực tế
          git diff --quiet && git diff --staged --quiet || (git commit -m "sys(SOTA): auto-generate sitemap & dynamic bridge [skip ci]" && git push)
