name: SEP AUTOMATION PROTOCOL

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Chạy bằng tay trên Chrome bất cứ lúc nào

permissions:
  contents: write  # Bắt buộc khai báo quyền ghi cho Bot tại đây

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run SOTA Generator Script
        run: |
          python Modules/SEP-Automation.py

      - name: Auto Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "sys(SOTA): auto-generate sitemap & dynamic bridge [skip ci]"
          file_pattern: "sitemap.xml Bridges/SEP-Observer.js"
          # Tự động đồng bộ và nạp trực tiếp không lo xung đột
