name: SEP AUTOMATION PROTOCOL

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Giữ nút bấm kích hoạt thủ công trên Mobile/Web

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Cho phép đọc lịch sử để thực hiện rebase không lỗi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Automation Script
        run: |
          python Modules/SEP-Automation.py

      - name: Commit and Push Autogenerated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Chỉ theo dõi và tự động push sitemap.xml và Bridges/SEP-Observer.js
          git add sitemap.xml Bridges/SEP-Observer.js
          
          # Thực hiện commit và push an toàn bằng cơ chế rebase
          if ! git diff --quiet --staged; then
            git commit -m "sys(SOTA): auto-generate sitemap & dynamic bridge [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected. Skipping push."
          fi
