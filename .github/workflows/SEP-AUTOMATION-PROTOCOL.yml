name: SEP AUTOMATION PROTOCOL

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Automation Script
        run: |
          python Modules/SEP-Automation.py

      - name: Commit and Push Autogenerated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add cả file sitemap và file JS được sinh tự động
          git add sitemap.xml Protocols/eseb_global_config.json Bridges/SEP-Observer.js
          
          # Chỉ commit và push nếu có sự thay đổi thực tế
          git diff --quiet && git diff --staged --quiet || (git commit -m "sys(SOTA): auto-generate sitemap, config and bridges" && git push)
