name: SEP AUTOMATION PROTOCOL

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Resolve Git State & Pull Latest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout sitemap.xml Bridges/SEP-Observer.js || true
          git pull origin main

      - name: Run SOTA Generator Script
        run: |
          python Modules/SEP-Automation.py

      - name: Force Commit and Push All Generated Files
        run: |
          # Thêm toàn bộ các file mới sinh ra (kể cả file nằm trong thư mục Bridges/)
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "sys(SOTA): auto-generate sitemap & dynamic bridge [skip ci]"
            git pull --rebase -Xours origin main
            git push origin HEAD:main
          else
            echo "No changes detected. Skipping push process."
          fi
