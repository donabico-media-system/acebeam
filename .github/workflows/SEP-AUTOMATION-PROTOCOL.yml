name: SEP AUTOMATION PROTOCOL

on:
  schedule:
    - cron: '0 */6 * * *' # Thực thi tự động mỗi 6 giờ để tái thiết lập ma trận bảo mật
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub bất cứ lúc nào

permissions:
  contents: write

jobs:
  run-sota-protocol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tải toàn bộ lịch sử để tránh các xung đột phân mảnh Git

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Resolve Git State & Pull Latest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout sitemap.xml Bridges/SEP-Observer.js || true
          git pull origin main

      - name: Execute SEP Space Generator
        run: |
          python Modules/SEP-Automation.py

      - name: Bulletproof Commit & Push To Main
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "sys(SOTA): dynamic space reconstruction and bridge seed deployment [skip ci]"
            git pull --rebase -Xours origin main
            git push origin HEAD:main
          else
            echo "Zero delta detected. Execution suspended."
          fi
