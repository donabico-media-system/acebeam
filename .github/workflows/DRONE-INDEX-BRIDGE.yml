name: DRONE INDEX BRIDGE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */4 * * *'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute ESEB BigTech Engine Core
        env:
          TARGET_DOMAIN: 'donabico-global-media.github.io'
        run: python Modules/Drone-Index-Bridge.py

      - name: Auto Commit & Push Generated JS Bridge
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Bridges/Drone-Index-Bridge.js
          git diff-index --quiet HEAD || git commit -m "ESEB Pipeline Sync: Auto-generated Drone-Index-Bridge.js [skip ci]"
          git push
