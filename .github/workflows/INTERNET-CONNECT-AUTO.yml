name: 🌊 INTERNET CONNECT AUTO

on:
  workflow_dispatch:
  push:
    paths:
      - 'Internet-Connect-Auto/**'
  schedule:
    - cron: '0 * * * *'

jobs:
  autonomous-ocean-pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛰️ Launch system
        run: python "Internet-Connect-Auto/Internet-Connect-Auto.py"

      - name: 📝 Commit and Push Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Cất tạm file log vừa ghi để sạch thư mục làm việc
          git stash
          
          # Đồng bộ từ remote về không lo xung đột
          git pull origin main --rebase
          
          # Lấy lại file log đã cất
          git stash pop
          
          # Commit và Đẩy
          git add Connection-Log.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update log $(date +'%Y-%m-%d %H:%M:%S')" && git push origin main)
