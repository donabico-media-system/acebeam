name: "INTERNET-CONNECT-AUTO"

on:
  # KHÁNG TRÙNG LẶP: Không bắt sự kiện push tự do, chỉ lắng nghe duy nhất trạng thái hoàn thành của Core chính
  workflow_run:
    workflows: ["CORE-ORCHESTRATOR"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-edge-deployment-lock"
  cancel-in-progress: true

jobs:
  broadcast-to-cdn:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # ĐIỀU KIỆN CHẶN: Chỉ thực thi nếu CORE-ORCHESTRATOR chạy THÀNH CÔNG (XANH)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: "1. Đóng Gói Phân Vùng index.html (Checkout Source)"
        uses: actions/checkout@v4

      - name: "2. Cấu Hình Khởi Tạo Hạ Tầng Pages CDN"
        uses: actions/configure-pages@v5

      - name: "3. Thu Gom Tài Nguyên Lõi Thành Gói Trực Tuyến (Upload Artifact)"
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
          if-no-files-found: error

      - name: "4. Kích Hoạt Bắn Dữ Liệu Ra Mạng Lưới CDN Toàn Cầu"
        id: deployment
        uses: actions/deploy-pages@v4
