name: "INTERNET-CONNECT-AUTO"

on:
  schedule:
    # Kích hoạt tự động chu kỳ chuẩn xác đúng 01 tiếng / lần (24/7)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Quyền kích hoạt JIT khẩn cấp từ giao diện Chrome Web của Admin

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pure-actions-flow"
  cancel-in-progress: true

jobs:
  pure_edge_propagation:
    runs-on: ubuntu-latest
    steps:
      - name: "Bước 01: Đồng bộ mã nguồn hệ sinh thái từ GitHub Satellite Node"
        uses: actions/checkout@v4

      - name: "Bước 02: Khởi tạo môi trường Python nâng cao kiểm toán cấu trúc"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Bước 03: Thực thi kịch bản mở cổng AI Matrix & Ping Bigtech Index"
        run: |
          python Internet-Connect-Auto/Internet-Connect-Auto.py

      - name: "Bước 04: Cấu hình phân quyền Git nội bộ định danh Hệ Thống"
        run: |
          git config --global user.name "donabico-global-media"
          git config --global user.email "donabico.media.system@gmail.com"

      - name: "Bước 05: Đẩy trực tiếp index.html và robots.txt AI ra CDN toàn cầu"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
