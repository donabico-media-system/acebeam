name: "INTERNET-CONNECT-AUTO"

on:
  schedule:
    # Kích hoạt tự động chu kỳ chuẩn xác đúng 01 tiếng / lần (24/7)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Quyền kích hoạt Just-In-Time (JIT) cấp Level 0 từ Admin Chrome Web

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pure-actions-flow"
  cancel-in-progress: true

jobs:
  pure_edge_propagation:
    runs-on: ubuntu-latest
    steps:
      - name: "Bước 01: Đồng bộ mã nguồn hệ sinh thái từ GitHub Satellite Node"
        uses: actions/checkout@v4

      - name: "Bước 02: Khởi tạo môi trường Python nâng cao kiểm toán cấu trúc"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Bước 03: Thực thi kịch bản gỡ bỏ Domain, tái thiết lập SEO Silo cho Bigtech"
        run: |
          python Internet-Connect-Auto/Internet-Connect-Auto.py

      - name: "Bước 04: Xuất bản và bắn thẳng trang tĩnh ra Internet qua GitHub Pages CDN"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: false
