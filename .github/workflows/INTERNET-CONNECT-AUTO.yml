name: 'INTERNET-CONNECT-AUTO'

on:
  schedule:
    # Kích hoạt tự động chu kỳ kiểm tra mỗi 30 phút toàn vẹn hệ thống
    - cron: '*/30 * * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    # Cho phép Admin kích hoạt kiểm tra thủ công từ trung tâm điều khiển GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "network-compliance-matrix"
  cancel-in-progress: true

jobs:
  connectivity_matrix_validation:
    name: 'Execute Network Ingestion Audit'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: '1. Checkout Repository Deployment Assets'
        uses: actions/checkout@v4

      - name: '2. Deploy Python Runtime Environment'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Loại bỏ cấu hình cache gây lỗi khi không có tệp requirements.txt

      - name: '3. Initialize System Environment Variables'
        run: |
          echo "NODE_ENVIRONMENT=GITHUB-PRODUCTION" >> $GITHUB_ENV
          echo "ADTECH_COMPLIANCE_YEAR=2026" >> $GITHUB_ENV

      - name: '4. Execute Core Connectivity & Resolution Core Script'
        run: |
          chmod +x ./Internet-Connect-Auto/Internet-Connect-Auto.py
          python ./Internet-Connect-Auto/Internet-Connect-Auto.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: '5. Pipeline Execution Output Verification'
        if: success()
        run: |
          echo "=========================================================================="
          echo "[ ADTECH COMPLIANCE AUDIT PASSED ] All nodes verified at global standard."
          echo "=========================================================================="

      - name: '6. Handle System Connection Dropouts'
        if: failure()
        run: |
          echo "=========================================================================="
          echo "[ CRITICAL FAULT ] System layout connection degradation detected!"
          echo "Verify status at destination: https://donabico-global-media.github.io/acebeam/"
          echo "=========================================================================="
