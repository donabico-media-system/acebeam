name: 🌊 INTERNET CONNECT AUTO

on:
  workflow_dispatch:
  push:
    paths:
      - 'Internet-Connect-Auto/**'
  schedule:
    - cron: '0 * * * *'

jobs:
  autonomous-ocean-pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Cài đặt thư viện (Bắt buộc)
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🛰️ Launch system
        run: python "Internet-Connect-Auto/Internet-Connect-Auto.py"

      - name: 📝 Commit and Push Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Connection-Log.txt
          git commit -m "Auto: Update log $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main --force
