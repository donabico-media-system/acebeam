name: "INTERNET-CONNECT-AUTO"

on:
  # CƠ CHẾ KHÁNG XUNG ĐỘT: Chỉ tự động giật chốt khi CORE-ORCHESTRATOR đã hoàn thành xuất sắc và đóng băng Git an toàn
  workflow_run:
    workflows: ["CORE-ORCHESTRATOR"]
    types:
      - completed
  # Cho phép chủ động bấm nút kích hoạt phát sóng thủ công từ giao diện Actions
  workflow_dispatch:

# Khóa cứng phân quyền độc quyền phục vụ hạ tầng Edge CDN Pages, cách ly hoàn toàn với Core
permissions:
  contents: read
  pages: write
  id-token: write

# Duy trì duy nhất 1 tiến trình deploy tại một thời điểm để tối ưu hóa Edge Node
concurrency:
  group: "pages-edge-deployment-lock"
  cancel-in-progress: true

jobs:
  broadcast-to-cdn:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # BỘ LỌC CHẶN AN TOÀN: Tuyệt đối không bốc dỡ nếu Core trước đó bị lỗi hoặc chưa dọn sạch mã nhảy trang
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: "1. Đóng Gói Phân Vùng index.html (Checkout Source)"
        uses: actions/checkout@v4

      - name: "2. Cấu Hình Khởi Tạo Hạ Tầng Pages CDN"
        uses: actions/configure-pages@v5

      - name: "3. Thu Gom Tài Nguyên Lõi Thành Gói Trực Tuyến (Upload Artifact)"
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ thu gom file index.html tĩnh đã được Core tối ưu hoàn toàn sạch sẽ
          path: "."
          if-no-files-found: error

      - name: "4. Kích Hoạt Bắn Dữ Liệu Ra Mạng Lưới CDN Toàn Cầu (Deploy to Pages CDN)"
        id: deployment
        uses: actions/deploy-pages@v4
