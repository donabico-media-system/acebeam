name: ACTIVE-PROTOCOLS-SOTA
on:
  schedule:
    - cron: '5-59/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sota-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with: { fetch-depth: 0 }
      - name: EXECUTE PROTOCOL SIPHON
        run: python Protocols/Active-Protocols.py
      - name: ATOMIC FORCE SYNC
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          git add Protocols-Bridge.json
          if ! git diff --cached --quiet; then
            git commit -m "[SYNC] Update Protocols-Bridge.json [skip ci]"
            git push origin main --force
          fi
